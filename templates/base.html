<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Analizador de Jugadores — Liga Profesional Argentina{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
<script>if(localStorage.getItem("theme")==="dark")document.documentElement.classList.add("dark-theme")</script>
</head>
<body>

<!-- ── SIDEBAR ────────────────────────────────────────── -->
<aside class="sidebar">
  <nav class="sidebar-nav">
    <a href="/scout" class="nav-btn{% if active_page == 'scout' %} active{% endif %}" title="Buscador por equipo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
        <path d="M11 8v6M8 11h6"/>
      </svg>
    </a>
    <a href="/ml" class="nav-btn{% if active_page == 'ml' %} active{% endif %}" title="Buscador por perfil de juego">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="5" r="2"/><circle cx="5" cy="12" r="2"/>
        <circle cx="19" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
        <line x1="12" y1="7" x2="7" y2="10"/><line x1="12" y1="7" x2="17" y2="10"/>
        <line x1="7" y1="14" x2="12" y2="17"/><line x1="17" y1="14" x2="12" y2="17"/>
        <line x1="7" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="17" y2="12"/>
      </svg>
    </a>
    <a href="/vaep" class="nav-btn{% if active_page == 'vaep' %} active{% endif %}" title="Buscador por VAEP">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <line x1="4" y1="20" x2="4" y2="10"/><line x1="9" y1="20" x2="9" y2="6"/>
        <line x1="14" y1="20" x2="14" y2="12"/><line x1="19" y1="20" x2="19" y2="3"/>
        <polyline points="1 20 23 20"/>
      </svg>
    </a>
    <a href="/liga" class="nav-btn{% if active_page == 'liga' %} active{% endif %}" title="Liga">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6 9H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h2"/>
        <path d="M18 9h2a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-2"/>
        <path d="M6 9a6 6 0 0 0 12 0"/><path d="M12 15v4"/>
        <path d="M8 21h8"/><path d="M12 3v2"/>
      </svg>
    </a>
  </nav>

  <div class="sidebar-bottom">
    <button class="nav-btn theme-btn" id="theme-toggle" title="Cambiar tema">
      <svg class="theme-icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="theme-icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</aside>

<!-- ── MAIN CONTENT ───────────────────────────────────── -->
<main class="main">

  <!-- HEADER -->
  <header class="topbar">
      <div class="topbar-title" style="display: flex; align-items: center; justify-content: space-between; width: 100%; position: relative; padding: 10px 0;">
        <div style="display: flex; align-items: center; gap: 8px; z-index: 2;">
          <span class="topbar-section-label" id="section-label" style="font-size: 22px; font-weight: 700; font-family: 'Outfit', sans-serif; letter-spacing: 1px;">{% block section_label %}Analizador y Buscador de Jugadores{% endblock %}</span>
          <span class="topbar-divider" style="opacity: 0.5;">·</span>
        </div>
        <div style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: max-content; z-index: 1;">
          <span class="topbar-sub" style="font-size: 30px; font-family: 'Rock Salt', cursive; letter-spacing: 2px;">
            LIGA PROFESIONAL ARGENTINA
          </span>
        </div>
        <div style="width: 200px; z-index: 2;"></div>

      </div>
    <div style="display: flex; align-items: center; justify-content: center; width: 120px; padding-right: 8px;">
      <div class="lpf-logo-bg">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/92/Logo_de_la_Liga_Profesional_de_F%C3%BAtbol_de_Argentina.svg/500px-Logo_de_la_Liga_Profesional_de_F%C3%BAtbol_de_Argentina.svg.png"
             alt="Liga Profesional Argentina"
             style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));">
      </div>
    </div>
  </header>

  {% block content %}{% endblock %}

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
